name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, next, 'feature/**', 'fix/**', 'refactor/**']
  pull_request:
    branches: [main, next]

env:
  GO_VERSION: '1.25.4'

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run go fmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck
        run: staticcheck ./...

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25.4']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Run tests
        run: ginkgo -v --race --cover --coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=$(cat VERSION)" \
            -o cukes-vhs-linux-amd64 ./cmd/cukes-vhs
          chmod +x cukes-vhs-linux-amd64
      - name: Build for macOS (AMD64)
        run: |
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-X main.version=$(cat VERSION)" \
            -o cukes-vhs-darwin-amd64 ./cmd/cukes-vhs
          chmod +x cukes-vhs-darwin-amd64
      - name: Build for macOS (ARM64)
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X main.version=$(cat VERSION)" \
            -o cukes-vhs-darwin-arm64 ./cmd/cukes-vhs
          chmod +x cukes-vhs-darwin-arm64
      - name: Build for Linux (ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.version=$(cat VERSION)" \
            -o cukes-vhs-linux-arm64 ./cmd/cukes-vhs
          chmod +x cukes-vhs-linux-arm64
      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=$(cat VERSION)" \
            -o cukes-vhs-windows-amd64.exe ./cmd/cukes-vhs
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: cukes-vhs-*
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
