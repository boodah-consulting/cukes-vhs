name: PR Validation

on:
  pull_request:
    branches: [main, next]
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate PR title against commitlint
        run: echo "${{ github.event.pull_request.title }}" | npx commitlint

  check-ai-attribution:
    name: Check AI Attribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for AI-Generated-By trailer
        run: |
          commits=$(git log --format='%H' ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          missing=""
          for sha in $commits; do
            body=$(git log -1 --format='%b' "$sha")
            if ! echo "$body" | grep -q "AI-Generated-By:"; then
              missing="$missing\n- $(git log -1 --format='%h %s' "$sha")"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::warning::The following commits are missing AI-Generated-By trailer:$missing"
          fi

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate conventional commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  breaking-changes:
    name: Detect Breaking Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for breaking changes
        id: breaking
        run: |
          commits=$(git log --format='%H' ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          found=false
          details=""
          for sha in $commits; do
            body=$(git log -1 --format='%b' "$sha")
            subject=$(git log -1 --format='%s' "$sha")
            if echo "$body" | grep -q "BREAKING CHANGE"; then
              found=true
              details="$details\n- $subject"
            fi
            if echo "$subject" | grep -q '!:'; then
              found=true
              details="$details\n- $subject"
            fi
          done
          echo "found=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "true" ]; then
            echo "details<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$details" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      - name: Comment on breaking changes
        if: steps.breaking.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## :warning: Breaking Changes Detected',
              '',
              'The following commits contain breaking changes:',
              '${{ steps.breaking.outputs.details }}',
              '',
              'Please ensure:',
              '- [ ] Breaking change is documented in commit body',
              '- [ ] Migration guide is provided if applicable',
              '- [ ] Version bump is appropriate (major)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  size-label:
    name: PR Size Label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'
          fail_if_xl: false
